name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · types · test · build
    runs-on: ubuntu-latest
    services:
      # packages/db integration tests run against a real Postgres (RLS can't
      # be proven against a mock) and fail loudly when it's missing.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workspace_engine_test
        ports:
          - 5443:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm run test
      - run: npm run build
      - run: npm run verify:artifacts
      - run: npm run size

  type-tests:
    # defineEntity's literal-type inference is a product feature; verify it across
    # every TypeScript version we claim to support (core devDep is ^5.6).
    name: type tests (TS ${{ matrix.ts }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ts: ["5.6", "5.7", "5.8", "5.9"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save typescript@${{ matrix.ts }} -w @workspace-engine/core
      - run: npm run test-types -w @workspace-engine/core
